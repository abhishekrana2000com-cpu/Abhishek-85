<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glam Girl Makeup Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💄 Glam Girl Makeup Game</h1>

<div class="game-container">
  <div class="face-area">
    <img id="face" src="https://i.imgur.com/1X6h7Qp.png">
  </div>

  <div class="tools">
    <h2>Makeup Tools</h2>
    <button onclick="lipstick('red')">💋 Red Lipstick</button>
    <button onclick="lipstick('pink')">💋 Pink Lipstick</button>
    <button onclick="lipstick('purple')">💋 Purple Lipstick</button>
    <button onclick="blush()">😊 Blush</button>
    <button onclick="glow()">✨ Glow</button>
    <button onclick="reset()">🔄 Reset</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
